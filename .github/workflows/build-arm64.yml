name: 构建 ARM64 Docker 镜像 (GHCR)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 设置环境变量，使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 QEMU 模拟器（用于构建 ARM64 镜像）
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 设置 Docker Buildx
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录到 GitHub Container Registry
      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. 构建并推送镜像到 GHCR（修复标签格式）
      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-admin:latest
            ghcr.io/${{ github.repository_owner }}/openclaw-admin:arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. 输出镜像信息
      - name: 输出镜像信息
        run: |
          echo "✅ 镜像构建成功！"
          echo "镜像名称: ghcr.io/${{ github.repository_owner }}/openclaw-admin:latest"
          echo "架构: linux/arm64"
          echo "在 ARM64 设备上运行: docker run -d -p 3001:3001 ghcr.io/${{ github.repository_owner }}/openclaw-admin:latest"
